name: Update README

on:
  schedule:
    - cron: "0 12 * * *" # Ejecutar todos los días a las 12:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests feedparser

      - name: Debug token presence
        run: |
          if [ -z "${README_ACCESS_TOKEN}" ]; then
            echo "README_ACCESS_TOKEN is empty"
            exit 1
          else
            echo "README_ACCESS_TOKEN is present"
          fi
        env:
          README_ACCESS_TOKEN: ${{ secrets.README_ACCESS_TOKEN }}

      - name: Test Cloudflare with header
        run: |
          curl -I -L \
            -H "X-Readme-Key: $README_ACCESS_TOKEN" \
            --max-time 20 \
            https://fabianalvarez.dev/instagram.json
        env:
          README_ACCESS_TOKEN: ${{ secrets.README_ACCESS_TOKEN }}

      - name: Checkout current repo
        uses: actions/checkout@v4
      
      - name: Checkout only instagram.json from private repo
        uses: actions/checkout@v4
        with:
          repository: SantaCRC/SantaCRC.github.io
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private-data
          sparse-checkout: |
            static/instagram.json
          sparse-checkout-cone-mode: false
          fetch-depth: 1

      - name: Debug connectivity
        run: |
          echo "Testing instagram.json..."
          curl -I -L --max-time 20 https://fabianalvarez.dev/instagram.json || true
          echo "Testing instagram.json with IPv4..."
          curl -4 -I -L --max-time 20 https://fabianalvarez.dev/instagram.json || true
          echo "Testing RSS feed..."
          curl -I -L --max-time 20 https://fabianalvarez.dev/index.xml || true

      - name: Run update script
        env:
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          README_ACCESS_TOKEN: ${{ secrets.README_ACCESS_TOKEN }}
        run: python scripts/update.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "Auto-update README.md"
          git push
